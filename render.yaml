services:
  - type: web
    name: healthcare-api
    runtime: python
    buildCommand: "pip install uv && uv pip install --system -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port 10000"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: healthcare-db
          property: connectionString
databases:
  - name: healthcare-db
    plan: free